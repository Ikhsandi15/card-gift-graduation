<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Ucapan Graduation - Arch Shape</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
            gap: 20px;
        }

        /* Editor Panel */
        .editor-panel {
            background: white;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
            border: 1px solid #eee;
        }

        .editor-panel h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            background: #fafafa;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #c9a227;
            background: white;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 50px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-png {
            background: #2c3e50;
            color: white;
        }

        .btn-png:hover {
            background: #1a252f;
        }

        .btn-pdf {
            background: #c0392b;
            color: white;
        }

        .btn-pdf:hover {
            background: #a93226;
        }

        /* Kartu Wrapper */
        .card-wrapper {
            position: relative;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* Area Cetak dengan Panduan Gunting */
        .print-area {
            position: relative;
            width: 500px;
            height: 700px;
            background: white;
        }

        /* Panduan Gunting - Kotak Luar */
        .cut-guide-outer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px dashed #bbb;
            border-radius: 0 0 8px 8px;
            pointer-events: none;
            z-index: 100;
        }

        /* Panduan Lengkung Atas - Setengah Lingkaran */
        .arch-guide {
            position: absolute;
            top: -2px;
            left: -2px;
            width: calc(100% + 4px);
            height: 250px;
            z-index: 101;
            pointer-events: none;
        }

        .arch-guide-line {
            fill: none;
            stroke: #bbb;
            stroke-width: 2;
            stroke-dasharray: 8, 4;
        }

        /* Kartu Sebenarnya (di dalam panduan) */
        .card-inner {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: white;
            /* Setengah lingkaran di atas: radius = setengah lebar */
            border-radius: 240px 240px 0 0;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.03);
        }

        /* Aksen 1: Garis emas tipis di atas */
        .top-accent-line {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 2px;
            background: #d4af37;
            opacity: 0.6;
            border-radius: 1px;
        }

        /* Aksen 2: Titik emas kecil di bawah divider */
        .bottom-accent-dot {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #d4af37;
            border-radius: 50%;
            opacity: 0.5;
        }

        /* Hiasan Sudut Minimalis */
        .corner-accent {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none;
            opacity: 0.4;
        }

        .corner-tl {
            top: 25px;
            left: 25px;
            border-top: 2px solid #d4af37;
            border-left: 2px solid #d4af37;
            border-radius: 4px 0 0 0;
        }

        .corner-tr {
            top: 25px;
            right: 25px;
            border-top: 2px solid #d4af37;
            border-right: 2px solid #d4af37;
            border-radius: 0 4px 0 0;
        }

        /* Kupu-kupu minimalis */
        .butterfly-mini {
            position: absolute;
            top: 45px;
            right: 70px;
            width: 35px;
            height: 35px;
            opacity: 0.7;
            pointer-events: none;
        }

        /* Konten Teks */
        .card-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 120px 50px 80px;
            text-align: center;
        }

        .graduation-cap {
            font-size: 48px;
            margin-bottom: 25px;
            line-height: 1;
            filter: grayscale(0.3);
        }

        /* Judul dengan font elegan tapi jelas */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            font-style: italic;
            color: #777;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        /* Nama dengan font BOLD dan JELAS - tidak menyambung */
        .name {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            line-height: 1.3;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: #d4af37;
            margin: 0 auto 30px;
            opacity: 0.8;
            border-radius: 2px;
        }

        .message {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-style: italic;
            color: #555;
            line-height: 1.5;
            max-width: 320px;
            letter-spacing: 0.3px;
        }

        /* Print styles */
        @media print {
            body { 
                background: white; 
                padding: 0;
            }
            .editor-panel { 
                display: none; 
            }
            .card-wrapper { 
                box-shadow: none; 
                padding: 0;
            }
            .cut-guide-outer {
                border-color: #ccc;
            }
            .arch-guide-line {
                stroke: #ccc;
            }
        }

        /* Mobile */
        @media (max-width: 540px) {
            .print-area {
                width: 340px;
                height: 480px;
            }
            .card-inner {
                border-radius: 160px 160px 0 0;
            }
            .title { font-size: 28px; }
            .name { font-size: 22px; }
            .message { font-size: 16px; }
            .card-content { padding: 90px 30px 60px; }
            .graduation-cap { font-size: 36px; }
            .top-accent-line { top: 60px; width: 70px; }
            .bottom-accent-dot { bottom: 90px; }
            .corner-accent { width: 45px; height: 45px; }
        }
    </style>
</head>
<body>

    <!-- Panel Editor -->
    <div class="editor-panel">
        <h3>✏️ EDIT KARTU UCAPAN</h3>
        
        <div class="input-group">
            <label>Judul Utama</label>
            <input type="text" id="inputTitle" value="Happy Graduation" oninput="updateCard()">
        </div>
        
        <div class="input-group">
            <label>Nama Wisudawan/i</label>
            <input type="text" id="inputName" value="KHOERUNISA A.MD.KEP" oninput="updateCard()">
        </div>
        
        <div class="input-group">
            <label>Ucapan</label>
            <textarea id="inputMessage" oninput="updateCard()">So Proud of you sayang!! 🖤</textarea>
        </div>

        <div class="btn-group">
            <button class="btn btn-png" onclick="downloadPNG()">📷 Simpan PNG</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">📄 Simpan PDF</button>
        </div>
    </div>

    <!-- Kartu -->
    <div class="card-wrapper">
        <div class="print-area" id="cardToDownload">
            
            <!-- Panduan Gunting -->
            <div class="cut-guide-outer"></div>
            
            <!-- Garis Lengkung Atas - Setengah Lingkaran -->
            <svg class="arch-guide" viewBox="0 0 504 250" preserveAspectRatio="none">
                <path class="arch-guide-line" d="M 2 250 L 2 125 Q 2 2 252 2 Q 502 2 502 125 L 502 250"/>
            </svg>

            <!-- Kartu Sebenarnya -->
            <div class="card-inner">
                <!-- Aksen 1: Garis emas tipis di atas -->
                <div class="top-accent-line"></div>

                <!-- Aksen 2: Titik emas kecil di bawah -->
                <div class="bottom-accent-dot"></div>

                <!-- Hiasan Sudut -->
                <div class="corner-accent corner-tl"></div>
                <div class="corner-accent corner-tr"></div>

                <!-- Kupu-kupu -->
                <svg class="butterfly-mini" viewBox="0 0 50 50">
                    <path d="M25 25 Q18 15 12 20 Q15 28 25 25 Q35 28 38 20 Q32 15 25 25" fill="#d4af37" opacity="0.8"/>
                    <path d="M25 25 Q18 32 14 36 Q20 34 25 25 Q30 34 36 36 Q32 32 25 25" fill="#d4af37" opacity="0.6"/>
                    <line x1="25" y1="18" x2="23" y2="12" stroke="#666" stroke-width="0.8"/>
                    <line x1="25" y1="18" x2="27" y2="12" stroke="#666" stroke-width="0.8"/>
                </svg>

                <!-- Konten -->
                <div class="card-content">
                    <div class="graduation-cap">🎓</div>
                    
                    <div class="title" id="cardTitle">Happy Graduation</div>
                    <div class="subtitle">congratulations on your graduation</div>
                    
                    <div class="name" id="cardName">KHOERUNISA A.MD.KEP</div>
                    
                    <div class="divider"></div>
                    
                    <div class="message" id="cardMessage">So Proud of you sayang!! 🖤</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        function updateCard() {
            document.getElementById('cardTitle').textContent = document.getElementById('inputTitle').value || 'Happy Graduation';
            document.getElementById('cardName').textContent = document.getElementById('inputName').value || 'NAMA';
            document.getElementById('cardMessage').textContent = document.getElementById('inputMessage').value || 'Ucapan';
        }

        async function downloadPNG() {
            const card = document.getElementById('cardToDownload');
            const btn = document.querySelector('.btn-png');
            const originalText = btn.textContent;
            
            btn.textContent = '⏳ Memproses...';
            btn.disabled = true;
            
            try {
                const canvas = await html2canvas(card, {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                const link = document.createElement('a');
                link.download = 'kartu-graduation-arch.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error(err);
                alert('Gagal mengunduh PNG. Coba lagi!');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        async function downloadPDF() {
            const card = document.getElementById('cardToDownload');
            const btn = document.querySelector('.btn-pdf');
            const originalText = btn.textContent;
            
            btn.textContent = '⏳ Memproses...';
            btn.disabled = true;
            
            try {
                const canvas = await html2canvas(card, {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                const imgData = canvas.toDataURL('image/png');
                
                // Ukuran print area 500x700px
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: [127, 178] // ~5x7 inch
                });
                
                pdf.addImage(imgData, 'PNG', 0, 0, 127, 178);
                pdf.save('kartu-graduation-arch.pdf');
                
            } catch (err) {
                console.error(err);
                alert('Gagal mengunduh PDF. Coba lagi!');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
    </script>

</body>
</html>
